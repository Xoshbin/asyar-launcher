name: Build (macOS, Windows & Linux)

on:
  push:
    branches:
      - main


jobs:
  test-and-lint:
    uses: ./.github/workflows/test-and-lint.yml

  build-macos:
    name: Build macOS
    needs: test-and-lint
    runs-on: macos-latest
    timeout-minutes: 40
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Wait for SDK on NPM
        run: |
          SDK_VERSION=$(node -p "require('./package.json').dependencies['asyar-sdk'] || require('./package.json').devDependencies['asyar-sdk']")
          SDK_VERSION=${SDK_VERSION#^}
          SDK_VERSION=${SDK_VERSION#~}
          echo "Waiting for asyar-sdk@$SDK_VERSION to be published on NPM..."
          for i in {1..30}; do
            if npm view asyar-sdk@$SDK_VERSION version >/dev/null 2>&1; then
              echo "✓ asyar-sdk@$SDK_VERSION is available!"
              exit 0
            fi
            echo "Waiting for SDK... (attempt $i/30)"
            sleep 30
          done
          echo "✖ SDK not found on NPM after 15 minutes. Proceeding anyway (might fail)..."

      - name: Install frontend dependencies
        run: pnpm install

      - name: Sync SvelteKit
        run: pnpm svelte-kit sync

      - name: Import Apple certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$APPLE_CERTIFICATE" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Build and Notarize
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build --target universal-apple-darwin

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v7
        with:
          name: asyar-macos
          path: src-tauri/target/universal-apple-darwin/release/bundle/
          retention-days: 7

  build-windows:
    name: Build Windows
    needs: test-and-lint
    runs-on: windows-latest
    timeout-minutes: 40
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Wait for SDK on NPM
        shell: pwsh
        run: |
          $SDK_VERSION = (Get-Content package.json | ConvertFrom-Json).dependencies.'asyar-sdk'
          if (-not $SDK_VERSION) { $SDK_VERSION = (Get-Content package.json | ConvertFrom-Json).devDependencies.'asyar-sdk' }
          $SDK_VERSION = $SDK_VERSION.TrimStart('^').TrimStart('~')
          Write-Host "Waiting for asyar-sdk@$SDK_VERSION to be published on NPM..."
          for ($i = 1; $i -le 30; $i++) {
            npm view asyar-sdk@$SDK_VERSION version | Out-Null
            if ($LASTEXITCODE -eq 0) {
              Write-Host "✓ asyar-sdk@$SDK_VERSION is available!"
              exit 0
            }
            Write-Host "Waiting for SDK... (attempt $i/30)"
            Start-Sleep -Seconds 30
          }
          Write-Host "✖ SDK not found on NPM after 15 minutes. Proceeding anyway (might fail)..."

      - name: Install frontend dependencies
        run: pnpm install

      - name: Sync SvelteKit
        run: pnpm svelte-kit sync

      - name: Build Tauri app
        run: pnpm tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v7
        with:
          name: asyar-windows
          path: src-tauri/target/release/bundle/
          retention-days: 7

  build-linux:
    name: Build Linux
    needs: test-and-lint
    runs-on: ubuntu-latest
    timeout-minutes: 40
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Wait for SDK on NPM
        run: |
          SDK_VERSION=$(node -p "require('./package.json').dependencies['asyar-sdk'] || require('./package.json').devDependencies['asyar-sdk']")
          SDK_VERSION=${SDK_VERSION#^}
          SDK_VERSION=${SDK_VERSION#~}
          echo "Waiting for asyar-sdk@$SDK_VERSION to be published on NPM..."
          for i in {1..30}; do
            if npm view asyar-sdk@$SDK_VERSION version >/dev/null 2>&1; then
              echo "✓ asyar-sdk@$SDK_VERSION is available!"
              exit 0
            fi
            echo "Waiting for SDK... (attempt $i/30)"
            sleep 30
          done
          echo "✖ SDK not found on NPM after 15 minutes. Proceeding anyway (might fail)..."

      - name: Install frontend dependencies
        run: pnpm install

      - name: Sync SvelteKit
        run: pnpm svelte-kit sync

      - name: Build Tauri app
        run: pnpm tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v7
        with:
          name: asyar-linux
          path: src-tauri/target/release/bundle/
          retention-days: 7
