name: Release

on:
  push:
    tags:
      - 'v*'  # triggers on version tags like v1.0.0


jobs:
  test-and-lint:
    uses: ./.github/workflows/test-and-lint.yml

  build-macos:
    needs: test-and-lint
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - uses: pnpm/action-setup@v5
        with:
          version: 9
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
      - name: Wait for SDK on NPM
        run: |
          SDK_VERSION=$(node -p "require('./package.json').dependencies['asyar-sdk'] || require('./package.json').devDependencies['asyar-sdk']")
          SDK_VERSION=${SDK_VERSION#^}
          SDK_VERSION=${SDK_VERSION#~}
          echo "Waiting for asyar-sdk@$SDK_VERSION to be published on NPM..."
          for i in {1..30}; do
            if npm view asyar-sdk@$SDK_VERSION version >/dev/null 2>&1; then
              echo "✓ asyar-sdk@$SDK_VERSION is available!"
              exit 0
            fi
            echo "Waiting for SDK... (attempt $i/30)"
            sleep 30
          done
          echo "✖ SDK not found on NPM after 15 minutes. Proceeding anyway (might fail)..."

      - run: pnpm install
      - run: pnpm svelte-kit sync

      - name: Import Apple certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$APPLE_CERTIFICATE" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Build and Notarize
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build --target universal-apple-darwin

      - name: Upload macOS Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: macos-artifacts
          path: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz*

  build-windows:
    needs: test-and-lint
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - uses: pnpm/action-setup@v5
        with:
          version: 9
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
      - name: Wait for SDK on NPM
        shell: pwsh
        run: |
          $SDK_VERSION = (Get-Content package.json | ConvertFrom-Json).dependencies.'asyar-sdk'
          if (-not $SDK_VERSION) { $SDK_VERSION = (Get-Content package.json | ConvertFrom-Json).devDependencies.'asyar-sdk' }
          $SDK_VERSION = $SDK_VERSION.TrimStart('^').TrimStart('~')
          Write-Host "Waiting for asyar-sdk@$SDK_VERSION to be published on NPM..."
          for ($i = 1; $i -le 30; $i++) {
            npm view asyar-sdk@$SDK_VERSION version | Out-Null
            if ($LASTEXITCODE -eq 0) {
              Write-Host "✓ asyar-sdk@$SDK_VERSION is available!"
              exit 0
            }
            Write-Host "Waiting for SDK... (attempt $i/30)"
            Start-Sleep -Seconds 30
          }
          Write-Host "✖ SDK not found on NPM after 15 minutes. Proceeding anyway (might fail)..."

      - run: pnpm install
      - run: pnpm svelte-kit sync
      - name: Build Windows
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build
      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: windows-artifacts
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/msi/*.msi.sig

  build-linux:
    needs: test-and-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libxdo-dev
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - uses: pnpm/action-setup@v5
        with:
          version: 9
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
      - name: Wait for SDK on NPM
        run: |
          SDK_VERSION=$(node -p "require('./package.json').dependencies['asyar-sdk'] || require('./package.json').devDependencies['asyar-sdk']")
          SDK_VERSION=${SDK_VERSION#^}
          SDK_VERSION=${SDK_VERSION#~}
          echo "Waiting for asyar-sdk@$SDK_VERSION to be published on NPM..."
          for i in {1..30}; do
            if npm view asyar-sdk@$SDK_VERSION version >/dev/null 2>&1; then
              echo "✓ asyar-sdk@$SDK_VERSION is available!"
              exit 0
            fi
            echo "Waiting for SDK... (attempt $i/30)"
            sleep 30
          done
          echo "✖ SDK not found on NPM after 15 minutes. Proceeding anyway (might fail)..."

      - run: pnpm install
      - run: pnpm svelte-kit sync
      - name: Build Linux
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build
      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: linux-artifacts
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/appimage/*.AppImage.sig

  publish:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Clean up stale draft releases
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          # Delete any draft releases for this tag left over from previous failed runs
          gh release list --json tagName,isDraft --jq ".[] | select(.tagName==\"$TAG\" and .isDraft) | .tagName" | while read -r t; do
            echo "Deleting stale draft release for $t..."
            gh release delete "$t" --yes --cleanup-tag=false
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.6.1
        with:
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.app.tar.gz*
            artifacts/**/*.msi
            artifacts/**/*.msi.sig
            artifacts/**/*.AppImage
            artifacts/**/*.AppImage.sig
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true

      - name: Notify Website
        env:
          ASYAR_UPDATE_TOKEN: ${{ secrets.ASYAR_UPDATE_TOKEN }}
          APP_URL: "https://asyar.org"
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          
          # Detect type: any hyphenated version (e.g., 0.1.0-1) is treated as beta
          TYPE="stable"
          if [[ "$VERSION" == *-* ]]; then
            TYPE="beta"
          fi
          
          # Locate files using find to handle any directory structure
          # For macOS, we need the .tar.gz for the updater
          MAC_FILE_PATH=$(find artifacts -name "*.app.tar.gz" | head -n 1)
          WIN_FILE_PATH=$(find artifacts -name "*.msi" | head -n 1)
          LINUX_FILE_PATH=$(find artifacts -name "*.AppImage" | head -n 1)
          
          MAC_SIG_PATH=$(find artifacts -name "*.app.tar.gz.sig" | head -n 1)
          WIN_SIG_PATH=$(find artifacts -name "*.msi.sig" | head -n 1)
          LINUX_SIG_PATH=$(find artifacts -name "*.AppImage.sig" | head -n 1)

          # Verify files exist before proceeding
          if [[ -z "$MAC_FILE_PATH" || -z "$WIN_FILE_PATH" || -z "$LINUX_FILE_PATH" ]]; then
            echo "Error: Binaries missing in artifacts. Note: macOS requires .app.tar.gz"
            ls -R artifacts
            exit 1
          fi
          
          if [[ -z "$MAC_SIG_PATH" || -z "$WIN_SIG_PATH" || -z "$LINUX_SIG_PATH" ]]; then
            echo "Error: Signatures (.sig files) missing in artifacts. Check tauri.conf.json bundle configuration."
            ls -R artifacts
            exit 1
          fi
          
          # Extract signatures and filenames
          MAC_SIG=$(cat "$MAC_SIG_PATH")
          WIN_SIG=$(cat "$WIN_SIG_PATH")
          LINUX_SIG=$(cat "$LINUX_SIG_PATH")
          
          MAC_FILE=$(basename "$MAC_FILE_PATH")
          WIN_FILE=$(basename "$WIN_FILE_PATH")
          LINUX_FILE=$(basename "$LINUX_FILE_PATH")
          
          REPO="${{ github.repository }}"
          TAG="${{ github.ref_name }}"
          BASE_URL="https://github.com/$REPO/releases/download/$TAG"

          # Use printf to construct JSON to avoid heredoc indention issues in YAML
          PAYLOAD=$(printf '{"version":"%s","type":"%s","notes":"Automated multi-platform release %s","platforms":{"darwin-aarch64":{"url":"%s/%s","signature":"%s"},"darwin-x86_64":{"url":"%s/%s","signature":"%s"},"windows-x86_64":{"url":"%s/%s","signature":"%s"},"linux-x86_64":{"url":"%s/%s","signature":"%s"}}}' \
            "$VERSION" "$TYPE" "$VERSION" \
            "$BASE_URL" "$MAC_FILE" "$MAC_SIG" \
            "$BASE_URL" "$MAC_FILE" "$MAC_SIG" \
            "$BASE_URL" "$WIN_FILE" "$WIN_SIG" \
            "$BASE_URL" "$LINUX_FILE" "$LINUX_SIG")
          
          curl -X POST "$APP_URL/api/releases" \
            -H "Content-Type: application/json" \
            -H "X-Asyar-Update-Token: $ASYAR_UPDATE_TOKEN" \
            -d "$PAYLOAD"