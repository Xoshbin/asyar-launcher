name: Release

on:
  push:
    tags:
      - 'v*'  # triggers on version tags like v1.0.0

jobs:
  build-macos:
    runs-on: macos-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install

      - name: Import Apple certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # Create a temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          
          # Import certificate
          echo "$APPLE_CERTIFICATE" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          
          # Make it the default keychain
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Build, sign and notarize
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build --target universal-apple-darwin

      - name: Verify signing and notarization
        run: |
          spctl --assess --verbose=2 --type exec \
            "src-tauri/target/universal-apple-darwin/release/bundle/macos/asyar.app"
          xcrun stapler validate \
            "src-tauri/target/universal-apple-darwin/release/bundle/macos/asyar.app"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          draft: true
          generate_release_notes: true

      - name: Notify Website of New Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          ASYAR_UPDATE_TOKEN: ${{ secrets.ASYAR_UPDATE_TOKEN }}
          APP_URL: "https://asyar.org"
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}" # Remove 'v' prefix if present
          
          # Find the DMG and its signature
          DMG_FILE=$(ls src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg | head -n 1)
          SIG_FILE="${DMG_FILE}.sig"
          
          if [ -f "$SIG_FILE" ]; then
            SIGNATURE=$(cat "$SIG_FILE")
            
            # Construct the payload
            PAYLOAD=$(cat <<EOF
            {
              "version": "$VERSION",
              "notes": "Automated release $VERSION",
              "platforms": {
                "darwin-aarch64": {
                   "url": "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/$(basename "$DMG_FILE")",
                   "signature": "$SIGNATURE"
                },
                "darwin-x86_64": {
                   "url": "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/$(basename "$DMG_FILE")",
                   "signature": "$SIGNATURE"
                }
              }
            }
          EOF
          )
            
            curl -X POST "$APP_URL/api/releases" \
              -H "Content-Type: application/json" \
              -H "X-Asyar-Update-Token: $ASYAR_UPDATE_TOKEN" \
              -d "$PAYLOAD"
          fi