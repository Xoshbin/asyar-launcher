<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Asyar</title>

    <script>
      (function() {
        // Detect development mode (Vite dev server usually runs on localhost:1420)
        const isDev = window.location.hostname === 'localhost' || window.location.port === '1420';
        const sveltePath = isDev ? '/node_modules/.vite/deps' : '/_app/immutable/chunks';
        
        const importMap = {
          imports: {
            'svelte': `${sveltePath}/svelte.js`,
            'svelte/animate': `${sveltePath}/svelte_animate.js`,
            'svelte/easing': `${sveltePath}/svelte_easing.js`,
            'svelte/internal': `${sveltePath}/svelte_internal.js`,
            'svelte/internal/client': `${sveltePath}/svelte_internal_client.js`,
            'svelte/internal/disclose-version': `${sveltePath}/svelte_internal_disclose-version.js`,
            'svelte/internal/flags/legacy': `${sveltePath}/svelte_internal_flags_legacy.js`,
            'svelte/internal/flags/tracing': `${sveltePath}/svelte_internal_flags_tracing.js`,
            'svelte/legacy': `${sveltePath}/svelte_legacy.js`,
            'svelte/motion': `${sveltePath}/svelte_motion.js`,
            'svelte/reactivity': `${sveltePath}/svelte_reactivity.js`,
            'svelte/reactivity/window': `${sveltePath}/svelte_reactivity_window.js`,
            'svelte/store': `${sveltePath}/svelte_store.js`,
            'svelte/transition': `${sveltePath}/svelte_transition.js`,
            'svelte/events': `${sveltePath}/svelte_events.js`,
            'asyar-sdk': isDev ? '/src/lib/asyar-sdk.ts' : `${sveltePath}/asyar-sdk.js`
          }
        };
        const s = document.createElement('script');
        s.type = 'importmap';
        s.textContent = JSON.stringify(importMap);
        document.head.appendChild(s);
      })();
    </script>
    <script>
      const ogConsoleError = console.error;
      console.error = function() {
        ogConsoleError.apply(console, arguments);
        const argsStr = Array.from(arguments).map(a => String(a?.message || a)).join(' ');
        fetch('/DEBUG_CONSOLE_ERR?msg=' + encodeURIComponent(argsStr));
      };
      window.addEventListener('error', (e) => {
        console.error('GLOBAL ERROR:', e.error || e.message);
      });
      window.addEventListener('unhandledrejection', (e) => {
        console.error('GLOBAL REJECTION:', e.reason);
      });
    </script>
    <script type="module">
      import * as internalClient from 'svelte/internal/client';
      import { from_html } from 'svelte/internal/client'; // Force inclusion of from_html for extensions
      window.__svelteInternalClient = internalClient;
      window.__svelteInternalClient_from_html = from_html;
      console.log("Svelte Internal Client Exports:", Object.keys(internalClient));
      console.log("Is from_html exported?", 'from_html' in internalClient, typeof internalClient.from_html);
    </script>

    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
